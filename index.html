<body>

  <div style="color:#9FB3DC;font-family:sans-serif;padding:40px;text-align:center;">Loading Finish Line…</div>
</div>
<script>
  window.addEventListener("error", function (e) {
    var root = document.getElementById("root");
    if (root) {
      root.innerHTML =
        '<pre style="color:#FF3366;background:#142B5C;padding:16px;margin:20px;border-radius:8px;white-space:pre-wrap;font-size:12px;font-family:monospace;">' +
        "App failed to load:\n" +
        ((e.error && e.error.stack) || e.message || "Unknown error") +
        "</pre>";
    }
  });
  window.addEventListener("unhandledrejection", function (e) {
    var root = document.getElementById("root");
    if (root) {
      root.innerHTML =
        '<pre style="color:#FF3366;background:#142B5C;padding:16px;margin:20px;border-radius:8px;white-space:pre-wrap;font-size:12px;font-family:monospace;">' +
        "App failed to load (promise rejection):\n" +
        ((e.reason && e.reason.stack) || e.reason || "Unknown error") +
        "</pre>";
    }
  });
</script>
<script type="text/plain" id="app-source">
const { useState, useEffect, useCallback, useRef } = React;

/* ---------- Design tokens ---------- */
const C = {
  bg: "#0B1A3D", bgPanel: "#142B5C", bgCard: "#1B3570", line: "#2E4A94",
  chalk: "#FFFFFF", chalkDim: "#9FB3DC", amber: "#FF5A1F", red: "#FF3366", green: "#C6FF3D",
};

const DISTANCE_OPTIONS = [
  { label: "5K", km: 5 }, { label: "10K", km: 10 }, { label: "15K", km: 15 },
  { label: "10 Miles", km: 16.0934 }, { label: "Half Marathon", km: 21.0975 },
  { label: "Marathon", km: 42.195 }, { label: "Ultra", km: null }, { label: "Other", km: null },
];

/* ---------- Helpers ---------- */
function parseTimeToSeconds(t) {
  if (!t) return null;
  const parts = t.split(":").map((p) => parseFloat(p));
  if (parts.some((p) => isNaN(p))) return null;
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return null;
}
function formatSeconds(sec) {
  if (sec == null || isNaN(sec)) return "--:--:--";
  sec = Math.round(sec);
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return [h, m, s].map((v) => String(v).padStart(2, "0")).join(":");
}
function formatPace(sec, km) {
  if (!sec || !km) return "--:--";
  const p = sec / km, m = Math.floor(p / 60), s = Math.round(p % 60);
  return `${m}:${String(s).padStart(2, "0")}/km`;
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

/* ---------- Image compression (data-URL based, iframe-safe) ---------- */
function compressImage(file, maxDim = 1400, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read the file from your device."));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Could not decode this image format. Try a JPG or PNG."));
      img.onload = () => {
        try {
          let { width, height } = img;
          if (width > height && width > maxDim) { height = Math.round((height * maxDim) / width); width = maxDim; }
          else if (height > maxDim) { width = Math.round((width * maxDim) / height); height = maxDim; }
          const canvas = document.createElement("canvas");
          canvas.width = width; canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL("image/jpeg", quality);
          resolve({ base64: dataUrl.split(",")[1], mimeType: "image/jpeg" });
        } catch (e) {
          reject(new Error("Could not process the image: " + (e && e.message ? e.message : "canvas error")));
        }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(",")[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

/* ---------- Claude extraction (uses the user's own API key) ---------- */
async function extractFromCertificate(base64, mimeType, apiKey) {
  if (!apiKey) throw new Error("Add your Anthropic API key in Settings to enable automatic reading.");
  const contentBlock = mimeType === "application/pdf"
    ? { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } }
    : { type: "image", source: { type: "base64", media_type: mimeType, data: base64 } };

  const prompt = `This is a race finisher certificate. Extract the following fields and respond with ONLY a raw JSON object, no markdown fences, no preamble:
{
  "raceName": string or null,
  "raceDate": "YYYY-MM-DD" or null,
  "distanceLabel": one of "5K","10K","15K","10 Miles","Half Marathon","Marathon","Ultra","Other",
  "distanceKm": number or null,
  "finishTime": "HH:MM:SS" or null,
  "location": string or null
}
If a field is unreadable, use null. Only output the JSON object.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-5",
      max_tokens: 1000,
      messages: [{ role: "user", content: [contentBlock, { type: "text", text: prompt }] }],
    }),
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message || "API error");
  const text = (data.content || []).map((b) => b.text || "").join("");
  const match = text.match(/\{[\s\S]*\}/);
  const clean = (match ? match[0] : text).replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

/* ---------- Local storage (device-only persistence) ---------- */
const storage = {
  async get(key) {
    const raw = localStorage.getItem("fl:" + key);
    return raw === null ? null : { key, value: raw };
  },
  async set(key, value) { localStorage.setItem("fl:" + key, value); return { key, value }; },
  async delete(key) { localStorage.removeItem("fl:" + key); return { key, deleted: true }; },
};
async function loadIndex() {
  try { const r = await storage.get("race-index"); return r ? JSON.parse(r.value) : []; } catch { return []; }
}
async function saveIndex(list) { await storage.set("race-index", JSON.stringify(list)); }
async function saveFull(id, payload) { await storage.set(`race-full:${id}`, JSON.stringify(payload)); }
async function loadFull(id) {
  try { const r = await storage.get(`race-full:${id}`); return r ? JSON.parse(r.value) : null; } catch { return null; }
}
async function deleteFull(id) { try { await storage.delete(`race-full:${id}`); } catch {} }
function getApiKey() { return localStorage.getItem("fl:apiKey") || ""; }
function setApiKey(key) { if (key) localStorage.setItem("fl:apiKey", key); else localStorage.removeItem("fl:apiKey"); }

/* ---------- UI atoms ---------- */
function Btn({ children, onClick, variant = "primary", disabled, type = "button" }) {
  const styles = {
    primary: { background: C.amber, color: "#FFFFFF", border: "none" },
    ghost: { background: "transparent", color: C.chalk, border: `1px solid ${C.line}` },
    danger: { background: "transparent", color: C.red, border: `1px solid ${C.red}55` },
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled} style={{
      ...styles[variant], padding: "10px 16px", borderRadius: 6, fontFamily: "Inter, sans-serif",
      fontWeight: 600, fontSize: 13, letterSpacing: 0.3, cursor: disabled ? "not-allowed" : "pointer",
      opacity: disabled ? 0.5 : 1,
    }}>{children}</button>
  );
}
function Field({ label, children }) {
  return (
    <label style={{ display: "flex", flexDirection: "column", gap: 6, fontFamily: "Inter, sans-serif" }}>
      <span style={{ fontSize: 11, letterSpacing: 1, textTransform: "uppercase", color: C.chalkDim }}>{label}</span>
      {children}
    </label>
  );
}
const inputStyle = {
  background: C.bg, border: `1px solid ${C.line}`, borderRadius: 6, padding: "10px 12px",
  color: C.chalk, fontFamily: "Inter, sans-serif", fontSize: 14, outline: "none", width: "100%",
};

function UploadLabel({ children, variant, disabled, onFile, capture }) {
  const styles = {
    primary: { background: C.amber, color: "#FFFFFF", border: "none" },
    ghost: { background: "transparent", color: C.chalk, border: `1px solid ${C.line}` },
  };
  return (
    <label style={{
      ...styles[variant || "primary"], padding: "10px 16px", borderRadius: 6, fontFamily: "Inter, sans-serif",
      fontWeight: 600, fontSize: 13, letterSpacing: 0.3, cursor: disabled ? "not-allowed" : "pointer",
      opacity: disabled ? 0.5 : 1, display: "inline-flex", alignItems: "center", justifyContent: "center",
    }}>
      {children}
      <input type="file" accept={capture ? "image/*" : "image/*,application/pdf"} capture={capture ? "environment" : undefined}
        disabled={disabled} style={{ position: "absolute", width: 1, height: 1, padding: 0, margin: -1, overflow: "hidden", clip: "rect(0,0,0,0)", border: 0 }}
        onChange={(e) => { const f = e.target.files[0]; e.target.value = ""; if (f) onFile(f); }} />
    </label>
  );
}

/* ---------- Settings modal ---------- */
function SettingsModal({ onClose }) {
  const [key, setKey] = useState(getApiKey());
  const [saved, setSaved] = useState(false);
  return (
    <div style={{ position: "fixed", inset: 0, background: "#00000090", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, padding: 16 }}>
      <div style={{ background: C.bgPanel, border: `1px solid ${C.line}`, borderRadius: 12, padding: 24, width: "100%", maxWidth: 440 }}>
        <h2 style={{ fontFamily: "Oswald, sans-serif", color: C.chalk, fontSize: 20, margin: "0 0 4px", textTransform: "uppercase" }}>Settings</h2>
        <p style={{ color: C.chalkDim, fontSize: 13, fontFamily: "Inter, sans-serif", marginTop: 8 }}>
          Automatic certificate reading needs an Anthropic API key. Get one free at console.anthropic.com — it's stored only on this device, never sent anywhere else.
        </p>
        <div style={{ marginTop: 16 }}>
          <Field label="Anthropic API key">
            <input style={inputStyle} type="password" value={key} onChange={(e) => setKey(e.target.value)} placeholder="sk-ant-..." />
          </Field>
        </div>
        {saved && <div style={{ color: C.green, fontSize: 12, marginTop: 8, fontFamily: "Inter, sans-serif" }}>Saved.</div>}
        <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}>
          <Btn variant="ghost" onClick={() => { setKey(""); setApiKey(""); setSaved(true); }}>Clear</Btn>
          <Btn variant="ghost" onClick={onClose}>Close</Btn>
          <Btn onClick={() => { setApiKey(key.trim()); setSaved(true); }}>Save</Btn>
        </div>
      </div>
    </div>
  );
}

/* ---------- Race Form ---------- */
function RaceForm({ initial, onSave, onCancel, ocrWarning }) {
  const [form, setForm] = useState(initial);
  const set = (k) => (e) => {
    const v = e.target ? e.target.value : e;
    setForm((f) => {
      const next = { ...f, [k]: v };
      if (k === "distanceLabel") {
        const preset = DISTANCE_OPTIONS.find((d) => d.label === v);
        if (preset && preset.km) next.distanceKm = String(preset.km);
      }
      return next;
    });
  };
  const canSave = form.raceName && form.finishTime && parseTimeToSeconds(form.finishTime) != null;
  return (
    <div style={{ position: "fixed", inset: 0, background: "#00000090", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, padding: 16 }}>
      <div style={{ background: C.bgPanel, border: `1px solid ${C.line}`, borderRadius: 12, padding: 24, width: "100%", maxWidth: 480, maxHeight: "90vh", overflowY: "auto" }}>
        <h2 style={{ fontFamily: "Oswald, sans-serif", color: C.chalk, fontSize: 20, margin: "0 0 4px", textTransform: "uppercase", letterSpacing: 1 }}>Confirm race details</h2>
        {ocrWarning && <p style={{ color: C.amber, fontSize: 12, marginTop: 4, fontFamily: "Inter, sans-serif" }}>{ocrWarning}</p>}
        <div style={{ display: "grid", gap: 14, marginTop: 16 }}>
          <Field label="Race name"><input style={inputStyle} value={form.raceName || ""} onChange={set("raceName")} placeholder="Ciudad de México Marathon" /></Field>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Field label="Date"><input type="date" style={inputStyle} value={form.raceDate || ""} onChange={set("raceDate")} /></Field>
            <Field label="Location"><input style={inputStyle} value={form.location || ""} onChange={set("location")} placeholder="CDMX" /></Field>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Field label="Distance">
              <select style={inputStyle} value={form.distanceLabel || "5K"} onChange={set("distanceLabel")}>
                {DISTANCE_OPTIONS.map((d) => <option key={d.label} value={d.label}>{d.label}</option>)}
              </select>
            </Field>
            <Field label="Distance (km)"><input style={inputStyle} value={form.distanceKm || ""} onChange={set("distanceKm")} placeholder="21.1" /></Field>
          </div>
          <Field label="Finish time (HH:MM:SS)"><input style={inputStyle} value={form.finishTime || ""} onChange={set("finishTime")} placeholder="01:52:30" /></Field>
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 24, justifyContent: "flex-end" }}>
          <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
          <Btn disabled={!canSave} onClick={() => onSave(form)}>Save race</Btn>
        </div>
      </div>
    </div>
  );
}

/* ---------- Scoreboard ---------- */
function Scoreboard({ races }) {
  const bests = {};
  races.forEach((r) => {
    const sec = parseTimeToSeconds(r.finishTime);
    if (sec == null) return;
    if (!bests[r.distanceLabel] || sec < bests[r.distanceLabel]) bests[r.distanceLabel] = sec;
  });
  const entries = Object.entries(bests);
  if (entries.length === 0) return null;
  return (
    <div style={{ background: C.bgPanel, border: `1px solid ${C.line}`, borderRadius: 12, padding: "20px 20px 16px", marginBottom: 28 }}>
      <div style={{ fontFamily: "Oswald, sans-serif", color: C.chalkDim, fontSize: 12, letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Personal bests</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12 }}>
        {entries.map(([label, sec]) => (
          <div key={label} style={{ background: C.bg, border: `1px solid ${C.line}`, borderRadius: 8, padding: "14px 12px" }}>
            <div style={{ fontFamily: "Inter, sans-serif", fontSize: 11, color: C.chalkDim, textTransform: "uppercase", letterSpacing: 1 }}>{label}</div>
            <div style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 24, fontWeight: 700, color: C.amber, marginTop: 4 }}>{formatSeconds(sec)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Race Card ---------- */
function RaceCard({ race, onDelete, onEdit, downloadState, onPrepareDownload }) {
  const sec = parseTimeToSeconds(race.finishTime);
  const btnBase = { padding: "10px 16px", borderRadius: 6, fontFamily: "Inter, sans-serif", fontWeight: 600, fontSize: 13, letterSpacing: 0.3, textDecoration: "none", display: "inline-flex", alignItems: "center", justifyContent: "center" };
  return (
    <div style={{ background: C.bgCard, border: `1px solid ${C.line}`, borderRadius: 10, padding: 18, display: "flex", flexDirection: "column", gap: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <div>
          <div style={{ fontFamily: "Oswald, sans-serif", color: C.chalk, fontSize: 17, letterSpacing: 0.3 }}>{race.raceName}</div>
          <div style={{ fontFamily: "Inter, sans-serif", color: C.chalkDim, fontSize: 12, marginTop: 3 }}>{race.raceDate || "Date unknown"}{race.location ? ` · ${race.location}` : ""}</div>
        </div>
        <span style={{ fontFamily: "Inter, sans-serif", fontSize: 11, fontWeight: 600, color: C.bg, background: C.green, padding: "3px 9px", borderRadius: 20, whiteSpace: "nowrap" }}>{race.distanceLabel}</span>
      </div>
      <div style={{ display: "flex", gap: 20, alignItems: "baseline", marginTop: 4 }}>
        <div>
          <div style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 26, fontWeight: 700, color: C.amber }}>{formatSeconds(sec)}</div>
          <div style={{ fontFamily: "Inter, sans-serif", fontSize: 11, color: C.chalkDim, marginTop: 2 }}>{formatPace(sec, parseFloat(race.distanceKm))} pace</div>
        </div>
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
        <Btn variant="ghost" onClick={() => onEdit(race)}>Edit</Btn>
        {race.hasFile && !downloadState && <Btn variant="ghost" onClick={() => onPrepareDownload(race)}>Download</Btn>}
        {race.hasFile && downloadState === "loading" && <Btn variant="ghost" disabled>Preparing…</Btn>}
        {race.hasFile && downloadState === "error" && <Btn variant="danger" onClick={() => onPrepareDownload(race)}>Retry download</Btn>}
        {race.hasFile && downloadState && typeof downloadState === "object" && (
          <a href={downloadState.href} download={downloadState.filename} style={{ ...btnBase, background: C.green, color: "#0A1A10", border: "none" }}>Tap to save file</a>
        )}
        <Btn variant="danger" onClick={() => onDelete(race)}>Delete</Btn>
      </div>
    </div>
  );
}

/* ---------- Empty state ---------- */
function EmptyState({ onFile, onManual }) {
  return (
    <div style={{ textAlign: "center", padding: "60px 20px", border: `1px dashed ${C.line}`, borderRadius: 12, color: C.chalkDim, fontFamily: "Inter, sans-serif" }}>
      <div style={{ fontFamily: "Oswald, sans-serif", fontSize: 20, color: C.chalk, marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>No races yet</div>
      <p style={{ maxWidth: 380, margin: "0 auto 20px", fontSize: 14 }}>Upload a finisher certificate and we'll read the details for you, or add a race manually.</p>
      <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
        <UploadLabel onFile={onFile} capture>Take photo</UploadLabel>
        <UploadLabel onFile={onFile} variant="ghost">Choose file</UploadLabel>
        <Btn variant="ghost" onClick={onManual}>Enter manually</Btn>
      </div>
    </div>
  );
}

/* ---------- Main App ---------- */
function App() {
  const [races, setRaces] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filterDistance, setFilterDistance] = useState("All");
  const [sortBy, setSortBy] = useState("date-desc");
  const [formState, setFormState] = useState(null);
  const [processing, setProcessing] = useState(false);
  const [error, setError] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [downloads, setDownloads] = useState({});

  useEffect(() => { (async () => { const idx = await loadIndex(); setRaces(idx); setLoading(false); })(); }, []);

  const handleFile = useCallback(async (file) => {
    if (!file) return;
    setError(""); setProcessing(true);
    try {
      const isPdf = file.type === "application/pdf";
      let stored = null, apiBase64, apiMime;
      try {
        if (isPdf) {
          apiBase64 = await fileToBase64(file);
          apiMime = "application/pdf";
          const approxBytes = (apiBase64.length * 3) / 4;
          if (approxBytes < 4.3 * 1024 * 1024) stored = { base64: apiBase64, mimeType: apiMime, fileName: file.name };
        } else {
          const compressed = await compressImage(file);
          apiBase64 = compressed.base64; apiMime = compressed.mimeType;
          stored = { base64: compressed.base64, mimeType: compressed.mimeType, fileName: file.name };
        }
      } catch (e) {
        throw new Error("Could not read that file on this device (" + (e && e.message ? e.message : "unknown decode error") + "). Try a JPG or PNG screenshot instead.");
      }

      let extracted = {}, ocrWarning = "";
      try {
        extracted = await extractFromCertificate(apiBase64, apiMime, getApiKey());
      } catch (e) {
        ocrWarning = (e && e.message) || "Couldn't read the certificate automatically — please fill in the fields below.";
      }

      setFormState({
        initial: {
          raceName: extracted.raceName || "", raceDate: extracted.raceDate || "",
          distanceLabel: extracted.distanceLabel || "5K",
          distanceKm: extracted.distanceKm != null ? String(extracted.distanceKm) : "5",
          finishTime: extracted.finishTime || "", location: extracted.location || "",
        },
        pendingFile: stored, editingId: null, ocrWarning,
      });
    } catch (e) {
      setError((e && e.message) || "Something went wrong reading that file. Try again or enter the race manually.");
    } finally { setProcessing(false); }
  }, []);

  const openManualForm = () => {
    setFormState({ initial: { raceName: "", raceDate: "", distanceLabel: "5K", distanceKm: "5", finishTime: "", location: "" }, pendingFile: null, editingId: null, ocrWarning: "" });
  };
  const openEditForm = (race) => {
    setFormState({ initial: { ...race }, pendingFile: undefined, editingId: race.id, ocrWarning: "" });
  };
  const handleSave = async (form) => {
    const id = formState.editingId || uid();
    const meta = {
      id, raceName: form.raceName, raceDate: form.raceDate, distanceLabel: form.distanceLabel,
      distanceKm: form.distanceKm, finishTime: form.finishTime, location: form.location,
      hasFile: formState.editingId ? races.find((r) => r.id === id)?.hasFile : !!formState.pendingFile,
    };
    if (formState.pendingFile) { await saveFull(id, formState.pendingFile); meta.hasFile = true; }
    let nextIndex = formState.editingId ? races.map((r) => (r.id === id ? meta : r)) : [...races, meta];
    await saveIndex(nextIndex); setRaces(nextIndex); setFormState(null);
  };
  const handleDelete = async (race) => {
    const nextIndex = races.filter((r) => r.id !== race.id);
    await saveIndex(nextIndex); setRaces(nextIndex); await deleteFull(race.id);
  };
  const prepareDownload = async (race) => {
    setDownloads((d) => ({ ...d, [race.id]: "loading" }));
    try {
      const full = await loadFull(race.id);
      if (!full) { setDownloads((d) => ({ ...d, [race.id]: "error" })); return; }
      const ext = full.mimeType === "application/pdf" ? "pdf" : "jpg";
      setDownloads((d) => ({ ...d, [race.id]: { href: `data:${full.mimeType};base64,${full.base64}`, filename: full.fileName || `${race.raceName || "certificate"}.${ext}` } }));
    } catch { setDownloads((d) => ({ ...d, [race.id]: "error" })); }
  };

  const filtered = races.filter((r) => filterDistance === "All" || r.distanceLabel === filterDistance).sort((a, b) => {
    if (sortBy === "date-desc") return (b.raceDate || "").localeCompare(a.raceDate || "");
    if (sortBy === "date-asc") return (a.raceDate || "").localeCompare(b.raceDate || "");
    if (sortBy === "fastest") { const sa = parseTimeToSeconds(a.finishTime) ?? Infinity, sb = parseTimeToSeconds(b.finishTime) ?? Infinity; return sa - sb; }
    return 0;
  });
  const distancesPresent = ["All", ...DISTANCE_OPTIONS.map((d) => d.label).filter((l) => races.some((r) => r.distanceLabel === l))];

  return (
    <div style={{ minHeight: "100vh", background: C.bg, padding: "0 0 60px", position: "relative", overflow: "hidden" }}>
      <RunnerSilhouette />
      <div style={{ maxWidth: 780, margin: "0 auto", padding: "32px 20px 0", position: "relative", zIndex: 1 }}>
        <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28, flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ fontFamily: "Anton, sans-serif", color: C.chalk, fontSize: 32, letterSpacing: 1, textTransform: "uppercase" }}>Finish Line</div>
            <div style={{ fontFamily: "Inter, sans-serif", color: C.chalkDim, fontSize: 13, marginTop: 2 }}>Your official race record</div>
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <Btn variant="ghost" onClick={() => setShowSettings(true)}>Settings</Btn>
            <Btn variant="ghost" onClick={openManualForm}>Enter manually</Btn>
            <UploadLabel onFile={handleFile} disabled={processing} capture variant="ghost">{processing ? "Reading…" : "Take photo"}</UploadLabel>
            <UploadLabel onFile={handleFile} disabled={processing}>{processing ? "Reading…" : "Choose file"}</UploadLabel>
          </div>
        </header>

        {error && <div style={{ background: `${C.red}22`, border: `1px solid ${C.red}55`, color: C.red, padding: "10px 14px", borderRadius: 8, marginBottom: 20, fontFamily: "Inter, sans-serif", fontSize: 13 }}>{error}</div>}
        {!loading && <Scoreboard races={races} />}

        {!loading && races.length > 0 && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12, marginBottom: 16 }}>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {distancesPresent.map((d) => (
                <button key={d} onClick={() => setFilterDistance(d)} style={{
                  fontFamily: "Inter, sans-serif", fontSize: 12, fontWeight: 600, padding: "6px 12px", borderRadius: 20,
                  border: `1px solid ${filterDistance === d ? C.amber : C.line}`, background: filterDistance === d ? `${C.amber}22` : "transparent",
                  color: filterDistance === d ? C.amber : C.chalkDim, cursor: "pointer",
                }}>{d}</button>
              ))}
            </div>
            <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} style={{ ...inputStyle, width: "auto", padding: "8px 10px", fontSize: 12 }}>
              <option value="date-desc">Newest first</option>
              <option value="date-asc">Oldest first</option>
              <option value="fastest">Fastest time</option>
            </select>
          </div>
        )}

        {loading ? (
          <div style={{ color: C.chalkDim, fontFamily: "Inter, sans-serif", textAlign: "center", padding: 40 }}>Loading…</div>
        ) : races.length === 0 ? (
          <EmptyState onFile={handleFile} onManual={openManualForm} />
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 14 }}>
            {filtered.map((r) => (
              <RaceCard key={r.id} race={r} onDelete={handleDelete} onEdit={openEditForm} downloadState={downloads[r.id]} onPrepareDownload={prepareDownload} />
            ))}
          </div>
        )}
      </div>

      {formState && <RaceForm initial={formState.initial} ocrWarning={formState.ocrWarning} onCancel={() => setFormState(null)} onSave={handleSave} />}
      {showSettings && <SettingsModal onClose={() => setShowSettings(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  (function () {
    function showError(prefix, err) {
      var root = document.getElementById("root");
      if (root) {
        root.innerHTML =
          '<pre style="color:#FF3366;background:#142B5C;padding:16px;margin:20px;border-radius:8px;white-space:pre-wrap;font-size:12px;font-family:monospace;">' +
          prefix + ":\n" + ((err && err.stack) || (err && err.message) || err) +
          "</pre>";
      }
    }
    try {
      var code = document.getElementById("app-source").textContent;
      var output = Babel.transform(code, { presets: ["react"], sourceType: "script" }).code;
      var script = document.createElement("script");
      script.type = "text/javascript";
      script.text = output;
      document.body.appendChild(script);
    } catch (e) {
      showError("Babel transform failed", e);
    }
  })();
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
